<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>.nev {
            height: auto;
            min-height: 50px;
            background-color: #2c2b2bfd;
            padding: 10px 15px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }

        .nev button {
            margin: 0 6px;
            background: none;
            border: none;
            font-size: clamp(13px, 2vw, 18px);
            font-weight: bold;
            color: #ffffff;
            cursor: pointer;
        }
        </style>
</head>
<body>
    <div class="nev">
        <button>About Me</button>
        <button>Technical Skills</button>
        <button>Portfolio</button>
        <button>Get in Touch</button>
    </div>
</body>
</html>
