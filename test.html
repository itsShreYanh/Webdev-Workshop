<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST</title>
    <style>
    *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

    html, body{
        height: 100%;
        width: 100%;
    }

    .main{
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        height: 100%;
        gap: 100px;
        width: 100%;
    }

    .content{
        background-color: rgb(118, 214, 182);
        border-radius: 10px;
        width: 70%;
        height: 80%;
        display: flex;
        justify-content: left;
        align-items: center;
        gap: 20px;
        overflow: hidden;
    }

    .left{
        width: 36%;
        height: 90%;
        display: flex;
        font-weight: bold;
        justify-content: center;
        align-items: center;
        color: rgb(255, 255, 255);
        flex-direction: column;
        text-align: center;
        padding: 10px;
        gap: 20px;
    }

    .right{
        width: 60%;
        height: 96%;
        background-color: azure;
        border: 1px solid black;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border-radius: 20px;
    }

    .nev{
        width: 100%;
        height: 10%;
        background-color: rgb(44, 75, 75);
        display: flex;
        justify-content: flex-end;
        align-items: center;
        padding-right: 10px;
    }

    .list{
        display: flex;
        gap: 10px;
    }

    .imag{
        width: 100%;
        height: 40%;
    }

    .imag img{
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    button{
        background-color: rgba(0, 255, 221, 0);
        height: 30px;
        width: 70px;
        border: 1px solid black;
        border-radius: 50px;
        cursor: pointer;
        font-weight: bolder;
        color: antiquewhite;
    }
button:hover{
        background-color: rgba(0, 255, 221, 0.507);
        height: 30px;
        width: 70px;
        border: 1px solid rgb(174, 0, 255);;
        border-radius: 50px;
        cursor: pointer;
    }

    .sontent{
        height: 40%;
        width: 80%;
        border: 2px solid rgb(164, 229, 231);
        display: flex;
        border-radius: 10px;
        margin: auto;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }

    .info{
        height: 60%;
        width: 20%;
        background-color: rgba(255, 255, 255, 0.226);
        border: 1px solid grey;
        border-radius: 10px;
    }

    .ro{
        display: flex;
        gap: 15px;
        width: 100%;
        height: 60%;
        justify-content: center;
        align-items: center;
    }
    span{
        font-size: large;
    }
    .last{
        margin-top: 70px;
        font-size: larger;
        font-weight: bolder;
    }
</style>
</head>
<body>

    <div class="main">
        <div class="content">
            <div class="left">
                <span>Create a</span>
                <h2>Your Travel Plan  And Tour Website <h2></h2><span class="last">WP Travel Engine</span></h2>
            </div>

            <div class="right">
                <div class="nev">
                    <div class="list">
                        <button>home</button>
                        <button>Book</button>
                        <button>Order</button>
                        <button>about</button>
                    </div>
                </div>

                <div class="imag">
                    <img src="https://img.freepik.com/free-photo/beautiful_1203-2633.jpg?semt=ais_hybrid&w=740&q=80" alt="">
                </div>

                <div class="sontent">
                    <div class="ro">
                        <div class="info"></div>
                        <div class="info"></div>
                        <div class="info"></div>
                        <div class="info"></div>
                    </div>
                    <div class="ro">
                        <div class="info"></div>
                        <div class="info"></div>
                        <div class="info"></div>
                        <div class="info"></div>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
